<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Skill Tracker</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f4f4f4;
}

header{
background:#006b89;
color:white;
padding:20px;
text-align:center;
}

input,select,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#222;
color:white;
cursor:pointer;
}

.container{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:
0 2px 8px rgba(0,0,0,.2);

}

.card h3{
color:#00897b;
}

.delete{

background:red;

margin-top:10px;

}

</style>

</head>

<body>

<header>

<h1>Career Skill Tracker</h1>

<input type="text"
id="search"
placeholder="Search Skill">

<select id="category">

<option value="all">
All
</option>

<option value="Frontend">
Frontend
</option>

<option value="Backend">
Backend
</option>

<option value="Database">
Database
</option>

</select>

<button onclick="addSkill()">

Add Skill

</button>

</header>

<div
class="container"
id="container">

</div>

<script>

let skills = JSON.parse(

localStorage.getItem("skills")

) || [

{
name:"HTML",
category:"Frontend"
},

{
name:"CSS",
category:"Frontend"
},

{
name:"JavaScript",
category:"Frontend"
},

{
name:"NodeJS",
category:"Backend"
},

{
name:"MongoDB",
category:"Database"
}

];

displaySkills();

function displaySkills(){

let container =

document.getElementById(

"container"

);

container.innerHTML="";

skills.forEach(

(skill,index)=>{

container.innerHTML += `

<div class="card">

<h3>

${skill.name}

</h3>

<p>

${skill.category}

</p>

<button

class="delete"

onclick=

"removeSkill(${index})">

Delete

</button>

</div>

`;

});

localStorage.setItem(

"skills",

JSON.stringify(skills)

);

}

function addSkill(){

let name =

prompt(

"Enter Skill Name"

);

let category =

prompt(

"Frontend / Backend / Database"

);

if(name && category){

skills.push({

name:name,

category:category

});

displaySkills();

}

}

function removeSkill(index){

skills.splice(index,1);

displaySkills();

}

document

.getElementById("search")

.addEventListener(

"keyup",

function(){

let text =

this.value

.toLowerCase();

document

.querySelectorAll(".card")

.forEach(card=>{

card.style.display=

card.innerText

.toLowerCase()

.includes(text)

?

"block"

:

"none";

});

});

document

.getElementById(

"category"

)

.addEventListener(

"change",

function(){

let value=

this.value;

document

.querySelectorAll(".card")

.forEach(card=>{

if(value==="all"){

card.style.display=

"block";

}

else{

card.style.display=

card.innerText

.includes(value)

?

"block"

:

"none";

}

});

});

</script>

</body>
</html>
