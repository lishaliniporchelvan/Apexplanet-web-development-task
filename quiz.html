<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:20px;
    width:500px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="question">Question</h2>

    <div id="options"></div>

    <button onclick="nextQuestion()">Next</button>

    <h3 id="result"></h3>
</div>

<script>

const quiz = [
{
question:"What does HTML stand for?",
options:["Hyper Text Markup Language","High Text Machine Language","Hyper Tool Markup Language","Home Tool Markup Language"],
answer:"Hyper Text Markup Language"
},
{
question:"Which language is used for styling web pages?",
options:["Python","CSS","Java","C++"],
answer:"CSS"
},
{
question:"Which language is used for web interactivity?",
options:["HTML","CSS","JavaScript","SQL"],
answer:"JavaScript"
}
];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

let q = quiz[currentQuestion];

document.getElementById("question").innerText = q.question;

let optionsHTML = "";

q.options.forEach(option => {
optionsHTML += `
<label class="option">
<input type="radio" name="answer" value="${option}">
${option}
</label>`;
});

document.getElementById("options").innerHTML = optionsHTML;
}

function nextQuestion(){

let selected = document.querySelector('input[name="answer"]:checked');

if(selected){
if(selected.value === quiz[currentQuestion].answer){
score++;
}
}

currentQuestion++;

if(currentQuestion < quiz.length){
loadQuestion();
}
else{
document.querySelector(".container").innerHTML =
`<h2>Quiz Completed!</h2>
<h3>Your Score: ${score}/${quiz.length}</h3>`;
}
}

loadQuestion();

</script>

</body>
</html>
